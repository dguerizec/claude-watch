<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claude Monitor Setup</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,sans-serif;max-width:400px;margin:0 auto;padding:20px;background:#f5f5f5;color:#333}
h2{margin:0 0 20px;text-align:center}
label{display:block;margin:12px 0 4px;font-weight:600;font-size:14px}
select,input,button{width:100%;padding:12px;margin:0 0 4px;border:1px solid #ccc;border-radius:6px;font-size:16px}
select:focus,input:focus{outline:none;border-color:#2563eb}
button{background:#2563eb;color:#fff;border:none;font-weight:600;cursor:pointer;margin-top:16px}
button:active{background:#1d4ed8}
.hint{font-size:12px;color:#888;margin:2px 0 0}
#status{text-align:center;padding:8px;display:none;border-radius:6px;margin-bottom:12px}
.btn-scan{background:#6b7280;margin-top:4px;padding:8px;font-size:14px}
</style>
</head><body>
<h2>Claude Monitor</h2>
<div id="status"></div>
<form method="POST" action="/connect" id="f">
<label for="ssid">WiFi Network</label>
<select name="ssid" id="ssid"><option value="">Scanning...</option></select>
<button type="button" class="btn-scan" onclick="scan()">Rescan</button>

<label for="password">WiFi Password</label>
<input type="password" name="password" id="password" placeholder="Leave empty for open networks">

<label for="tz">Timezone</label>
<select name="timezone" id="tz">
<option value="CET-1CEST,M3.5.0,M10.5.0/3">Europe/Paris</option>
<option value="GMT0BST,M3.5.0/1,M10.5.0">Europe/London</option>
<option value="EET-2EEST,M3.5.0/3,M10.5.0/4">Europe/Helsinki</option>
<option value="EST5EDT,M3.2.0,M11.1.0">US/Eastern</option>
<option value="CST6CDT,M3.2.0,M11.1.0">US/Central</option>
<option value="MST7MDT,M3.2.0,M11.1.0">US/Mountain</option>
<option value="PST8PDT,M3.2.0,M11.1.0">US/Pacific</option>
<option value="JST-9">Asia/Tokyo</option>
<option value="CST-8">Asia/Shanghai</option>
<option value="IST-5:30">Asia/Kolkata</option>
<option value="AEST-10AEDT,M10.1.0,M4.1.0/3">Australia/Sydney</option>
<option value="UTC0">UTC</option>
</select>

<label for="fi">Fetch Interval</label>
<select name="fetch_int" id="fi">
<option value="1">1 min</option>
<option value="2">2 min</option>
<option value="5">5 min</option>
<option value="10" selected>10 min</option>
<option value="15">15 min</option>
<option value="30">30 min</option>
</select>

<label for="refresh_tk">Refresh Token</label>
<p class="hint">Run this in a terminal, then paste the result:</p>
<div style="background:#1e293b;color:#e2e8f0;padding:10px;border-radius:6px;font-family:monospace;font-size:12px;word-break:break-all;margin:4px 0 8px;cursor:pointer" onclick="navigator.clipboard.writeText(this.textContent)">jq -r '.claudeAiOauth.refreshToken' ~/.claude/.credentials.json</div>
<input type="text" name="refresh_tk" id="refresh_tk" placeholder="Optional - can set later">
<p class="hint">Tap the command above to copy it</p>

<button type="submit">Connect</button>
</form>
<script>
function scan(){
  var s=document.getElementById('ssid');
  s.innerHTML='<option value="">Scanning...</option>';
  fetch('/scan').then(function(r){return r.json()}).then(function(nets){
    if(!nets.length){s.innerHTML='<option value="">No networks found</option>';return}
    s.innerHTML='';
    nets.sort(function(a,b){return b.rssi-a.rssi});
    var seen={};
    nets.forEach(function(n){
      if(!n.ssid||seen[n.ssid])return;
      seen[n.ssid]=1;
      var o=document.createElement('option');
      o.value=n.ssid;
      o.textContent=n.ssid+' ('+n.rssi+' dBm)';
      s.appendChild(o);
    });
  }).catch(function(){
    s.innerHTML='<option value="">Scan failed</option>';
  });
}
scan();
document.getElementById('f').onsubmit=function(e){
  e.preventDefault();
  var ssid=document.getElementById('ssid').value;
  if(!ssid){
    var st=document.getElementById('status');
    st.style.display='block';st.style.background='#fee2e2';st.style.color='#b91c1c';
    st.textContent='Please select a network';
    return;
  }
  var fd=new URLSearchParams(new FormData(this));
  fetch('/connect',{method:'POST',body:fd}).then(function(){
    document.body.innerHTML='<div style="text-align:center;padding:60px 20px"><h2>OK!</h2><p>Device will reboot and connect to your WiFi.</p></div>';
  }).catch(function(){
    document.body.innerHTML='<div style="text-align:center;padding:60px 20px"><h2>Sent!</h2><p>Device should reboot shortly.</p></div>';
  });
  document.body.innerHTML='<div style="text-align:center;padding:60px 20px"><h2>Connecting...</h2><p>Sending configuration...</p></div>';
};
</script>
</body></html>
